<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Connecting to Spotify…</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  #msg { opacity: 0.75; font-size: 1.2rem; line-height: 1.5; }
  a { color: #fff; }
</style>
</head>
<body>
  <div id="msg">Connecting to Spotify…</div>

  <script src="js/spotify-auth.js"></script>
  <script>
    const msg = document.getElementById('msg');
    SpotifyAuth.handleCallback()
      .then(() => window.location.replace('index.html'))
      .catch((err) => {
        msg.innerHTML = 'Connection failed:<br>' + err.message +
          '<br><br><a href="index.html">Back to dashboard</a>';
      });
  </script>
</body>
</html>
