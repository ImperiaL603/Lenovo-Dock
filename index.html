<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Tablet Dashboard</title>

<!-- Quicksand from Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <video id="bg-video" class="bg-video" autoplay muted loop playsinline
       src="assets/video/endless-summer-horizon.1920x1080.mp4"></video>

  <!-- Dev-only helper, remove once real Spotify playback detection is wired up -->
  <div id="dev-toggle-hint">press M to toggle clock / spotify mode (dev only)</div>

  <!-- ===================== CLOCK MODE ===================== -->
  <section id="clock-mode" class="mode active">

    <div class="clock-block" id="clock-block">
      <div class="clock-day" id="clock-day">Thursday</div>
      <div class="clock-date" id="clock-date">17 July 2026</div>
      <div class="clock-time">
        <span class="dash">-</span>
        <span class="clock-hm" id="clock-hm">2:36</span>
        <span class="clock-ampm" id="clock-ampm">AM</span>
        <span class="dash">-</span>
      </div>
    </div>

    <!-- Alarms / Timers panel: hidden until "+" is tapped -->
    <div class="panel" id="panel">
      <div class="panel-section">
        <div class="panel-title">Alarms</div>
        <div class="panel-list" id="alarms-list">
          <div class="placeholder-row">No alarms set</div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Timers</div>
        <div class="panel-list" id="timers-list">
          <div class="placeholder-row">No timers running</div>
        </div>
      </div>
    </div>

    <button id="add-btn" class="add-btn" aria-label="Add alarm or timer">
      <span>+</span>
    </button>

  </section>

  <!-- ===================== SPOTIFY MODE ===================== -->
  <section id="spotify-mode" class="mode">

    <div class="spotify-layout">

      <!-- Left: player -->
      <div class="player-column">

        <div class="album-art-box" id="album-art-box">
          <img id="album-art-img" alt="" />
          <div class="album-art-placeholder" id="album-art-placeholder">Album Art</div>

          <div class="control-buttons" id="control-buttons" aria-disabled="true">
            <button class="ctrl-btn" data-action="prev" disabled>⏮</button>
            <button class="ctrl-btn" data-action="playpause" disabled>⏯</button>
            <button class="ctrl-btn" data-action="next" disabled>⏭</button>
          </div>
        </div>

        <div class="progress-row">
          <span class="progress-time" id="progress-elapsed">0:46</span>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-time" id="progress-total">3:43</span>
        </div>

        <div class="song-name" id="song-name">Song Name</div>
        <div class="artist-names" id="artist-names">Artists' Names</div>
      </div>

      <!-- Right: lyrics -->
      <div class="lyrics-column">
        <div class="lyrics-window" id="lyrics-window">
          <div class="lyric-line prev" id="lyric-prev">Previous line goes here</div>
          <div class="lyric-line current" id="lyric-current">Lyrics Window</div>
          <div class="lyric-line next" id="lyric-next">Next line goes here</div>
        </div>

        <div class="playlist-name" id="playlist-name">Playlist Name</div>
      </div>

    </div>

  </section>

<!-- Settings panel: hidden until gear icon is tapped -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-panel-title">Settings</div>
</div>

<button id="settings-btn" class="settings-btn" aria-label="Open settings">
  <span>&#9881;</span>
</button>

<!-- One-time Spotify login; auto-hides once connected -->
<button id="spotify-connect-btn" class="spotify-connect-btn">Connect Spotify</button>

<script src="js/spotify-auth.js"></script>
<script src="js/script.js"></script>
</body>
</html>
